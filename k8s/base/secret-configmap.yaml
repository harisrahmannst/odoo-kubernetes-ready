apiVersion: v1
kind: Secret
metadata:
  name: odoo-secret-001
  namespace: odoo
  labels:
    app.kubernetes.io/name: odoo
    app.kubernetes.io/instance: main
type: Opaque
stringData:
  PASSWORD: "<CHANGE_ME>"

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: odoo-config-002
  namespace: odoo
  labels:
    app.kubernetes.io/name: odoo
    app.kubernetes.io/instance: main

data:
  odoo.conf: |
    [options]
    db_host = db-svc-001
    db_user = <CHANGE_ME>
    addons_path = /mnt/extra-addons
    data_dir = /var/lib/odoo
    admin_passwd = <CHANGE_ME>
    workers = 0
    max_cron_threads = 2

    limit_memory_hard = 2684354560
    limit_memory_soft = 2147483648

    limit_time_cpu = 600
    limit_time_real = 1200
    limit_time_real_cron = 1200

    proxy_mode = True
    limit_request = 8192
