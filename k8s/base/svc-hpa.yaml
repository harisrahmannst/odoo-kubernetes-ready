apiVersion: v1
kind: Service
metadata:
  name: odoo-service-001
  namespace: odoo
  labels:
    app.kubernetes.io/name: odoo
    app.kubernetes.io/instance: main
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: odoo
  ports:
  - name: http
    port: 80
    targetPort: 8069

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: odoo-hpa-001
  namespace: odoo
  labels:
    app.kubernetes.io/name: odoo
    app.kubernetes.io/instance: main
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: odoo-deployment-001
  minReplicas: 1
  maxReplicas: 5

  metrics:
  - resource:
      name: cpu
      target:
        averageUtilization: 80
        type: Utilization
    type: Resource
  - resource:
      name: memory
      target:
        averageUtilization: 80
        type: Utilization
    type: Resource

  behavior:
    scaleUp:
      policies:
      - type: Pods
        value: 2
        periodSeconds: 60
      - type: Percent
        value: 50
        periodSeconds: 60
    scaleDown:
      policies:
      - type: Pods
        value: 1
        periodSeconds: 60
      - type: Percent
        value: 20
        periodSeconds: 60
      stabilizationWindowSeconds: 300
